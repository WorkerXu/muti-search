<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #f3f4f6; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 1; }
      .soft { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1; }
      .active { fill: #eaf2ff; stroke: #2f6fed; stroke-width: 1; }
      .text { fill: #111827; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #6b7280; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font-size: 18px; }
      .small { font-size: 22px; }
      .normal { font-size: 26px; }
      .title { font-size: 32px; font-weight: 700; }
      .bold { font-weight: 700; }
      .green { fill: #16a34a; }
      .orange { fill: #d97706; }
      .blue { fill: #2563eb; }
      .red { fill: #dc2626; }
      .line { stroke: #e5e7eb; stroke-width: 1; }
      .icon { fill: none; stroke: #374151; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
